name: release

# v*.*.* タグの push でビルドし、GitHub Release への成果物アップロードと npm publish を行う。
# 前提: リポジトリ設定で Immutable Releases を有効化し、タグは署名して push する。
# workflow_dispatch でも起動でき、その場合はビルドのみ(publish はタグ push のときだけ)。
on:
  push:
    tags: ["v*.*.*"]
  workflow_dispatch:

permissions: {}

jobs:
  # Linux は nix の musl 静的バイナリ。linux-x64 は seed 済みキャッシュから取得(数秒)。
  # linux-arm64 は初回のみソースビルドになり得るため cachix へ push して seed する
  # (CACHIX_AUTH_TOKEN が必要)。以降はキャッシュヒットで高速。
  build-linux:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            target: linux-x64
          - runner: ubuntu-24.04-arm
            target: linux-arm64
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 120
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - uses: cachix/install-nix-action@08dcb3a5e62fa31e2da3d490afc4176ef55ecd72 # v30
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
      - uses: cachix/cachix-action@ad2ddac53f961de1989924296a1f236fcfbaa4fc # v15
        with:
          name: acac
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
      - name: Build static binary
        run: |
          nix build .#static
          install -m 0755 result/bin/acac "acac-${{ matrix.target }}"
      - name: Upload binary artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: acac-${{ matrix.target }}
          path: acac-${{ matrix.target }}

  # macOS / Windows は実機 runner 上で ghcup(haskell-actions/setup)+ cabal でビルドする。
  # フル static にはせず、各 OS 標準のシステムライブラリにリンクする(その OS では可搬)。
  build-native:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-14
            target: darwin-arm64
            ext: ""
          - runner: macos-15-intel
            target: darwin-x64
            ext: ""
          - runner: windows-latest
            target: win32-x64
            ext: ".exe"
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 60
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - uses: haskell-actions/setup@cd0d9bdd65b20557f41bea4dbe43d0b5fbbfe553 # v2.11.0
        with:
          ghc-version: "9.12.2"
          cabal-version: "latest"
      - name: Build with cabal
        shell: bash
        run: |
          cabal update
          cabal build exe:acac
          install -m 0755 "$(cabal list-bin exe:acac)" "acac-${{ matrix.target }}${{ matrix.ext }}"
      - name: Upload binary artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: acac-${{ matrix.target }}
          path: acac-${{ matrix.target }}${{ matrix.ext }}

  # 全プラットフォームのバイナリを GitHub Release に添付する(タグ push のときのみ)。
  github-release:
    needs:
      - build-linux
      - build-native
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
    steps:
      - name: Download all binaries
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          path: artifacts
          merge-multiple: true
      - name: Create release and upload binaries
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2.6.2
        with:
          files: artifacts/acac-*
          fail_on_unmatched_files: true

  # プラットフォーム別 npm パッケージと本体パッケージを publish する(タグ push のときのみ)。
  publish-npm:
    needs:
      - build-linux
      - build-native
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
      # OIDC trusted publishing には npm >= 11.5.1 が必要(node20 同梱は npm10 のため更新する)。
      - name: Upgrade npm for OIDC trusted publishing
        run: npm install -g npm@latest
      - name: Download all binaries
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          path: artifacts
          merge-multiple: true
      - name: Place binaries into platform packages
        run: |
          for target in linux-x64 linux-arm64 darwin-arm64 darwin-x64; do
            mkdir -p "npm/packages/$target/bin"
            install -m 0755 "artifacts/acac-$target" "npm/packages/$target/bin/acac"
          done
          mkdir -p npm/packages/win32-x64/bin
          install -m 0755 "artifacts/acac-win32-x64.exe" "npm/packages/win32-x64/bin/acac.exe"
      # license フィールドを宣言しているので tarball にも LICENSE 本体を同梱する。
      - name: Copy LICENSE into npm packages
        run: |
          cp LICENSE npm/LICENSE
          for target in linux-x64 linux-arm64 darwin-arm64 darwin-x64 win32-x64; do
            cp LICENSE "npm/packages/$target/LICENSE"
          done
      - name: Set versions from the tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          npm --prefix npm pkg set version="$VERSION"
          for target in linux-x64 linux-arm64 darwin-arm64 darwin-x64 win32-x64; do
            npm --prefix npm pkg set "optionalDependencies.acac-$target=$VERSION"
            npm --prefix "npm/packages/$target" pkg set version="$VERSION"
          done
      # 認証は OIDC trusted publishing(npmjs.com 側で各パッケージに設定済み)。
      # NODE_AUTH_TOKEN は不要。provenance は trusted publishing で自動付与される。
      - name: Publish platform packages
        run: |
          for target in linux-x64 linux-arm64 darwin-arm64 darwin-x64 win32-x64; do
            npm publish "npm/packages/$target" --provenance --access public
          done
      - name: Publish main package
        working-directory: npm
        run: npm publish --provenance --access public
